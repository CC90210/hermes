name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          # Provide the minimum env vars required by manager/config.py
          # without exposing real credentials — tests that need a real
          # connection must use the mock adapter or be skipped in CI.
          EMAIL_USER: ci-test@example.com
          EMAIL_PASSWORD: ci-placeholder
          A2000_MODE: mock
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: qwen2.5:32b
        run: pytest tests/ -v

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Validate pyproject.toml
        run: python -c "import tomllib; tomllib.loads(open('pyproject.toml').read())"

      - name: Build package
        run: python -m build
